server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: second-hand-trading-platform
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_trading?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    initialization-mode: always
    schema: classpath:db/schema.sql
    data: classpath:db/data.sql
    continue-on-error: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.trading.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT配置
jwt:
  secret: campus-second-hand-trading-platform-secret-key-2024
  expiration: 86400000 # 24小时，单位：毫秒

# 文件上传配置
file:
  upload:
    path: uploads  # 相对路径，相对于项目根目录
    max-size: 10485760 # 10MB

# 支付宝配置
alipay:
  gateway: https://openapi-sandbox.dl.alipaydev.com/gateway.do  # 沙箱环境网关（新地址，2024年推荐）
  # gateway: https://openapi.alipaydev.com/gateway.do  # 沙箱环境网关（旧地址，仍可用但可能不稳定）
  # gateway: https://openapi.alipay.com/gateway.do  # 生产环境网关
  appId: 9021000159633464
  privateKey: |
    -----BEGIN PRIVATE KEY-----
    
    -----END PRIVATE KEY-----
  publicKey: |
    -----BEGIN PUBLIC KEY-----
    
    -----END PUBLIC KEY-----
  signType: RSA2
  charset: UTF-8
  format: JSON
  notifyUrl: https://gibbed-jona-thrice.ngrok-free.dev/api/payments/alipay/notify  # 异步通知地址（ngrok公网地址）
  returnUrl: http://localhost:8080/api/payments/alipay/return  # 同步跳转地址（本地测试使用localhost，如果支付宝不接受，需要使用ngrok等公网地址）

# AI客服配置 - DeepSeek
ai:
  api:
    url: ${AI_API_URL:https://api.deepseek.com}  # DeepSeek API地址
    key: ${AI_API_KEY:}  # DeepSeek API密钥（在 https://platform.deepseek.com 获取）
    type: ${AI_API_TYPE:deepseek}  # AI API类型：deepseek, openai, qwen, custom
    model: ${AI_API_MODEL:deepseek-chat}  # 模型名称：deepseek-chat（便宜）或 deepseek-reasoner（推理能力强）
